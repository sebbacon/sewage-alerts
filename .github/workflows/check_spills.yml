name: Check sewage spills

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:        # allows manual trigger for testing

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for nearby spills
        run: python check_spills.py
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_SEB_POSTCODE: ${{ secrets.RECIPIENT_SEB_POSTCODE }}
          RECIPIENT_SEB_EMAIL: ${{ secrets.RECIPIENT_SEB_EMAIL }}
          RECIPIENT_AMY_POSTCODE: ${{ secrets.RECIPIENT_AMY_POSTCODE }}
          RECIPIENT_AMY_EMAIL: ${{ secrets.RECIPIENT_AMY_EMAIL }}
